<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智能视频流分析平台</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎥</text></svg>" />
  <link rel="stylesheet" href="src/style.css" />
</head>
<body>
  <div id="app">
    <!-- ===== 侧边导航 ===== -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-logo">◆</span>
        <span class="sidebar-title">智能视频流分析平台</span>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-item active" data-page="dashboard" href="#">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          <span>工作台</span>
        </a>
        <a class="nav-item" data-page="streams" href="#">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
          <span>推流管理</span>
        </a>
        <a class="nav-item" data-page="detection" href="#">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          <span>检测项目</span>
        </a>
        <a class="nav-item" data-page="algorithms" href="#">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/></svg>
          <span>算法管理</span>
        </a>
        <a class="nav-item" data-page="alerts" href="#">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/></svg>
          <span>告警中心</span>
          <span class="nav-badge">8</span>
        </a>
        <a class="nav-item" data-page="tickets" href="#">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
          <span>工单分发</span>
          <span class="nav-badge">5</span>
        </a>
        <a class="nav-item" data-page="users" href="#">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
          <span>人员权限</span>
        </a>
        <a class="nav-item" data-page="system" href="#">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          <span>系统管理</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar">A</div>
          <div>
            <div class="user-name">管理员</div>
            <div class="user-role">系统管理员</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- ===== 主内容区 ===== -->
    <main class="main-content" id="mainContent">
      <!-- 顶部栏 -->
      <header class="topbar">
        <button class="sidebar-toggle" id="sidebarToggle">☰</button>
        <div class="topbar-title" id="pageTitle">工作台</div>
        <div class="topbar-actions">
          <div class="topbar-time" id="topbarTime"></div>
          <div class="notif-btn" id="notifBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
            <span class="notif-dot"></span>
          </div>
        </div>
      </header>

      <!-- 页面容器 -->
      <div class="page-container" id="pageContainer"></div>
    </main>
  </div>

  <!-- ===== 弹窗 ===== -->
  <div class="modal-overlay" id="modalOverlay" style="display:none">
    <div class="modal" id="modalContent"></div>
  </div>

  <!-- ===== Toast ===== -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- 加载动画 -->
  <div id="appLoader" style="position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f0f2f5;transition:opacity .4s">
    <div style="width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:#1a56db;border-radius:50%;animation:spin .8s linear infinite"></div>
    <div style="margin-top:16px;font-size:14px;color:#666">加载中...</div>
  </div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>

  <script src="https://cdn.jsdelivr.net/npm/flv.js@1.6.2/dist/flv.min.js"></script>
  <script src="src/db.js"></script>
  <script src="src/utils/dom.js"></script>
  <script src="src/utils/flv.js"></script>
  <script src="src/app.js"></script>
  <script src="src/pages/dashboard.js"></script>
  <script src="src/pages/streams.js"></script>
  <script src="src/pages/detection.js"></script>
  <script src="src/pages/algorithms.js"></script>
  <script src="src/pages/alerts.js"></script>
  <script src="src/pages/tickets.js"></script>
  <script src="src/pages/users.js"></script>
  <script src="src/pages/system.js"></script>
  <script src="src/api.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
